<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="index.js" defer></script>
</head>
<body class="calculator">
    <h1 class="calculator-title">Calculator</h1>
    <div class="calculator-display" aria-live="polite">0</div>
    <ul class="calculator-buttons">
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
        <li>5</li>
        <li>6</li>
        <li>7</li>
        <li>8</li>
        <li>9</li>
        <li>0</li>
        <li>=</li>
        <li>C</li>
        <li>+</li>
        <li>-</li>
        <li>*</li>
        <li>/</li>
    </ul>
</body>
</html>
